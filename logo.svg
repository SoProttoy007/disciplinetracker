<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#ring)" stroke-width="2"/>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="88" fill="url(#bg)"/>

  <!-- Inner dark circle -->
  <circle cx="100" cy="100" r="72" fill="#0f172a" opacity="0.5"/>

  <!-- Lightning bolt (Spark icon) -->
  <polygon points="112,30 80,108 100,108 88,170 128,85 106,85 120,30"
    fill="url(#bolt)" filter="url(#glow)"/>

  <!-- Orbit ring -->
  <ellipse cx="100" cy="100" rx="78" ry="20" fill="none"
    stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"
    transform="rotate(-25 100 100)"/>

  <!-- Small orbit dot -->
  <circle cx="172" cy="88" r="5" fill="#6366f1" opacity="0.8"/>

  <!-- DT text -->
  <text x="100" y="192" font-family="'Outfit', Arial, sans-serif"
    font-size="18" font-weight="800" fill="#94a3b8"
    text-anchor="middle" letter-spacing="6">DISCIPLINE</text>
</svg>
